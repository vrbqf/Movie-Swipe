<ion-content [fullscreen]="true" class="tiktok-container">

  @for (movie of movies; track movie.id) {
    <div class="video-slide">
      <div class="background"
           [style.backgroundImage]="'url(' + imageUrl + movie.poster_path + ')'"></div>
      <div class="overlay">
        <div class="info">
          <h2>{{ movie.title || movie.name }}</h2>
          <p class="rating">⭐ {{ movie.vote_average }}</p>

          <p class="description"
             [class.expanded]="isDescriptionExpanded(movie)"
             (click)="toggleDescription(movie)">
            {{ movie.overview }}
          </p>
        </div>
        <div class="actions">
          <ion-button fill="clear" (click)="toggleFavorite(movie); $event.stopPropagation()">
            <span [style.color]="isFavorite(movie) ? 'red' : 'white'">❤️</span>
          </ion-button>
        </div>
      </div>
    </div>
  }


</ion-content>
