<ion-header>
  <ion-toolbar>
    <ion-title>Popular {{ searchType === 'movie' ? 'Movies' : 'TV Shows' }}</ion-title>
    <ion-buttons slot="end">
      <ion-item lines="none">
        <ion-label>Light / Dark Mode</ion-label>
        <ion-toggle [(ngModel)]="darkMode" (ionChange)="toggleDarkMode()"></ion-toggle>
      </ion-item>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- 🔍 Vyhledávání -->
  <ion-item>
    <ion-input
      placeholder="Search..."
      [(ngModel)]="searchQuery"
      (ionInput)="searchItems()"
      [clearInput]="true"
    ></ion-input>
  </ion-item>

  <!-- 🎬 Přepínání film / TV -->
  <ion-segment [(ngModel)]="searchType" (ionChange)="loadPopular()" class="type-segment">
    <ion-segment-button value="movie">Movies</ion-segment-button>
    <ion-segment-button value="tv">TV Shows</ion-segment-button>
  </ion-segment>

  <!-- Grid filmů / seriálů -->
  <ion-grid>
    <ion-row>
      <ion-col size="6" *ngFor="let movie of movies">
        <ion-card (click)="openMovie(movie)" class="movie-card">

          <!-- Favorite button v rohu -->
          <ion-button fill="clear" class="fav-btn" (click)="toggleFavorite(movie); $event.stopPropagation()">
            <span [style.color]="isFavorite(movie) ? 'red' : 'gray'">❤️</span>
          </ion-button>

          <img *ngIf="movie.poster_path" [src]="imageUrl + movie.poster_path" />
          <ion-card-header>
            <ion-card-title>{{ movie.title || movie.name }}</ion-card-title>
          </ion-card-header>

        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <!-- Modalní detail -->
  <div *ngIf="selectedMovie" class="modal-backdrop">
    <div class="modal-content">
      <ion-button fill="clear" class="close-btn" (click)="closeMovie()">X</ion-button>
      <img *ngIf="selectedMovie.poster_path" [src]="imageUrl + selectedMovie.poster_path" />
      <h2>{{ selectedMovie.title || selectedMovie.name }}</h2>
      <p>{{ selectedMovie.overview }}</p>
      <p>⭐ Rating: {{ selectedMovie.vote_average }}</p>
    </div>
  </div>

</ion-content>
