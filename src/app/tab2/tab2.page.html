<ion-header>
  <ion-toolbar>
    <ion-title>Chci vidět</ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-segment [value]="viewType" (ionChange)="segmentChanged($event)">
      <ion-segment-button value="movie">
        <ion-label>Filmy</ion-label>
      </ion-segment-button>
      <ion-segment-button value="tv">
        <ion-label>Seriály</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    @for (movie of getFilteredMovies(); track movie.id) {
      <ion-card>
        @if (movie.obrazek) {
          <img [src]="movie.obrazek" [alt]="movie.nazev" />
        }
        <ion-card-header>
          <ion-card-title>{{ movie.nazev }}</ion-card-title>
        </ion-card-header>
        <div class="ion-padding">
          <ion-button color="danger" fill="outline" (click)="removeFromWant(movie.id)">
            Odebrat
          </ion-button>
        </div>
      </ion-card>
    } @empty {
      <div class="ion-padding ion-text-center">
        <p>Žádné uložené {{ viewType === 'movie' ? 'filmy' : 'seriály' }}.</p>
      </div>
    }
  </ion-list>
</ion-content>
